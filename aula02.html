<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula02 - menu hamburguer</title>

    <style>
        .navbar {
            background-color: black;
        }
        .logo {
            color: white;
        }

         /*Estilo de lista de links*/
         .nav-Links{
            list-style: none;
            display: flex; /* Exibe horizontal o nome*/
            gap: 20px;
            margin: 0;
            padding: 0;
         }


         .nav-Links a {
            color: wheat;
            text-decoration: none;
            font-size: 20px;
         }

         /*Estilo do Botão Hamburguer (escondido no desktop)*/

            .hamburguer{
                display: none;
                background: none;
                border: none;
                color: white;
                font-size: 24px;
                cursor: pointer:
            }
    /*Responsabilidade*/
    @media screen and (ma-width: 768px){
        .hamburguer{
            /*mostrar o botão hambuguer*/
            display: block;
        }

        /*Esconde a lista e muda o layout para a vertical*/
        .nav-Links{
            display: none;
            flex-direction: column;
            position: absolute;
            top: 60px; /*altura da navbar*/
            left: 0;
            width: 100%;
            background-color: #333;
            text-align: center;
            padding: 20px 0;
        }
        /* Classe que será adicionada ao javascript para mostrar o menu*/
        .nav-Links.active{
            display: flex;
        }
    }
    
    
    
    </style>
    

</head>
<body>

    <nav class="navbar">
        <div class="logo">Meu site</div>

        <!-- Botão Hamburguer para responsividade -->
        <button class="hamburguer" id="hamburguer-btn">
            &#9776; <!-- Símbolo do ícone de menu -->
        </button>

        <!-- Lista de itens do menu -->
        <ul class="nav-links" id="nav-links">
             
           <li>
                <a href="https://www.amazon.com.br/">Início</a>
           </li> 
           <li>
            <a href="https://www.youtub.com.br/">Sobre</a>
            <li>
                <a href="https://www.linkedin.com.br/">Serviços</a>
           </li>
       </li>
       <li>
        <a href="https://www.instagram.com.br/">Contato</a>
   </li> 
        </ul>
    </nav>
    
    <div style="padding: 20px;">
        <h1>Conteúdo da página</h1>
        <p>Redimensione a janela do navegador para ver o menu mudar.</p>
    </div>
    <a href="" style="text-decoration: nonr; color: red;">Qualquer coisa</a>
      
    
    <script>
       //SELECIONA OS ELEMENTOS DE HTML
       const hamburguerbtn = document.getElementById('hamburguer-btn')
       const navLinks = document.getElementById('nav-Links')

       //ADICIONAR UM EVENTO AO BOTÃO CLIK

       hamburguerbtn.addEventListener('click',() => {
         navLinks.classList.toggle('active');
       } )
       
    </script>


</body>
</html>
